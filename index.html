<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLUENTEERING | QR Trail</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #0f0f0f; --card: #1a1a1a; --text: #ffffff; --muted: #888;
            --accent: #e8ff47; --danger: #ff4747; --border: #333;
        }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        .page { display: none; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .page.active { display: flex; flex-direction: column; }
        
        /* PIN PAGE */
        #pin { align-items: center; justify-content: center; text-align: center; }
        input[type="password"] { 
            background: #222; border: 2px solid var(--border); color: white; 
            padding: 15px; font-size: 24px; border-radius: 8px; width: 120px; text-align: center;
        }

        /* ADMIN LAYOUT */
        .admin-shell { display: grid; grid-template-columns: 280px 1fr; height: 100vh; margin: -20px; }
        .sidebar { background: #151515; border-right: 1px solid var(--border); padding: 20px; overflow-y: auto; }
        .editor { padding: 40px; overflow-y: auto; background: var(--bg); }
        
        .clue-item { 
            padding: 12px; border-radius: 8px; margin-bottom: 8px; cursor: pointer;
            border: 1px solid var(--border); display: flex; align-items: center; gap: 10px;
        }
        .clue-item.selected { border-color: var(--accent); background: #222; }
        
        .btn { 
            padding: 10px 20px; border-radius: 6px; cursor: pointer; border: none; font-weight: bold;
            transition: 0.2s;
        }
        .btn-accent { background: var(--accent); color: black; }
        .btn-danger { background: var(--danger); color: white; }
        
        .editor-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .editor-card { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); }
        
        textarea, input[type="text"] {
            width: 100%; padding: 12px; background: #000; border: 1px solid var(--border);
            color: white; border-radius: 6px; margin-top: 8px; box-sizing: border-box;
        }
    </style>
</head>
<body>

<!-- PIN PAGE -->
<div id="pin" class="page active">
    <h1>CLUENTEERING</h1>
    <p style="color:var(--muted)">Enter Admin PIN to begin</p>
    <input type="password" id="pinInput" maxlength="4" placeholder="0000" oninput="checkPin()">
    <p id="pinError" style="color:var(--danger); display:none; margin-top:10px;">Incorrect PIN</p>
</div>

<!-- ADMIN PAGE -->
<div id="admin" class="page">
    <div class="admin-shell">
        <div class="sidebar">
            <h3 style="margin-top:0">STOPS</h3>
            <div id="clueList"></div>
            <button class="btn btn-accent" style="width:100%; margin-top:10px" onclick="addClue()">+ Add Stop</button>
        </div>
        <div class="editor" id="editorArea">
            <!-- Content loaded via JS -->
        </div>
    </div>
</div>

<script>
// Paste the logic from before here
let state = {
    pin: '1234',
    clues: [{ title: 'START', clue: 'Find the blue door.', accentColor: '#e8ff47' }]
};

function checkPin() {
    const input = document.getElementById('pinInput');
    if (input.value === state.pin) {
        document.getElementById('pin').classList.remove('active');
        document.getElementById('admin').classList.add('active');
        renderSidebar();
    } else if (input.value.length === 4) {
        document.getElementById('pinError').style.display = 'block';
    }
}

function renderSidebar() {
    const list = document.getElementById('clueList');
    list.innerHTML = '';
    state.clues.forEach((c, i) => {
        const el = document.createElement('div');
        el.className = 'clue-item';
        el.innerHTML = `<span>${i + 1}</span> <strong>${c.title}</strong>`;
        el.onclick = () => renderEditor(i);
        list.appendChild(el);
    });
}

function addClue() {
    state.clues.push({ title: 'NEW STOP', clue: 'New clue text...', accentColor: '#e8ff47' });
    renderSidebar();
    renderEditor(state.clues.length - 1);
}

function deleteClue(idx) {
    if (state.clues.length <= 1) return alert("You need at least one stop!");
    if (confirm("Delete this stop?")) {
        state.clues.splice(idx, 1);
        renderSidebar();
        document.getElementById('editorArea').innerHTML = '';
    }
}

function renderEditor(idx) {
    const clue = state.clues[idx];
    const area = document.getElementById('editorArea');
    area.innerHTML = `
        <div class="editor-header">
            <h2>Edit Stop ${idx + 1}</h2>
            <button class="btn btn-danger" onclick="deleteClue(${idx})">🗑 Delete</button>
        </div>
        <div class="editor-card">
            <label>Stop Title</label>
            <input type="text" value="${clue.title}" oninput="state.clues[${idx}].title=this.value; renderSidebar()">
            <label style="display:block; margin-top:15px">Clue Text</label>
            <textarea rows="4" oninput="state.clues[${idx}].clue=this.value">${clue.clue}</textarea>
        </div>
    `;
}
</script>
</body>
</html>
