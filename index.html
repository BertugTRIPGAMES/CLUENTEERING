<script>
// --- STATE MANAGEMENT ---
let state = {
    pin: '1234',
    clues: [{ 
        title: 'STARTING LINE', 
        clue: 'Welcome to the trail! Find the first QR code near the main entrance.', 
        accentColor: '#e8ff47',
        bgImage: null 
    }]
};

// --- PAGE ROUTING ---
window.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const stopIdx = params.get('stop');
    if (stopIdx !== null) {
        renderPlayerView(parseInt(stopIdx));
    }
});

function renderPlayerView(idx) {
    const clue = state.clues[idx];
    if (!clue) return;

    document.body.innerHTML = `
        <div style="background: ${clue.bgImage ? 'url(' + clue.bgImage + ')' : 'var(--bg)'}; background-size: cover; background-position: center; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; font-family: sans-serif;">
            <div style="background: rgba(26, 26, 26, 0.9); border: 2px solid ${clue.accentColor}; padding: 40px; border-radius: 20px; max-width: 500px; width: 100%; text-align: center; backdrop-filter: blur(10px); box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
                <div style="color: ${clue.accentColor}; font-weight: bold; letter-spacing: 2px; margin-bottom: 10px;">STOP ${idx + 1}</div>
                <h1 style="margin: 0 0 20px 0; font-size: 32px; color: white;">${clue.title}</h1>
                <p style="font-size: 18px; line-height: 1.6; color: #ccc;">${clue.clue}</p>
                <button onclick="window.location.href=window.location.pathname" style="margin-top: 30px; background: transparent; border: 1px solid #444; color: #888; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Admin Login</button>
            </div>
        </div>
    `;
}

// --- ADMIN FUNCTIONS ---
function checkPin() {
    if (document.getElementById('pinInput').value === state.pin) {
        document.getElementById('pin').classList.remove('active');
        document.getElementById('admin').classList.add('active');
        renderSidebar();
    }
}

function renderSidebar() {
    const list = document.getElementById('clueList');
    list.innerHTML = '';
    state.clues.forEach((c, i) => {
        const el = document.createElement('div');
        el.className = 'clue-item';
        el.innerHTML = `<span>${i + 1}</span> <strong>${c.title}</strong>`;
        el.onclick = () => renderEditor(i);
        list.appendChild(el);
    });
}

function addClue() {
    state.clues.push({ title: 'NEW STOP', clue: 'Write your clue here...', accentColor: '#e8ff47', bgImage: null });
    renderSidebar();
    renderEditor(state.clues.length - 1);
}

function deleteClue(idx) {
    if (state.clues.length <= 1) return alert("Must have at least one stop.");
    if (confirm("Delete this stop?")) {
        state.clues.splice(idx, 1);
        renderSidebar();
        document.getElementById('editorArea').innerHTML = '<h2>Select a stop</h2>';
    }
}

function handleImage(idx, input) {
    const reader = new FileReader();
    reader.onload = (e) => {
        state.clues[idx].bgImage = e.target.result;
        alert("Image uploaded! Check the Preview.");
    };
    reader.readAsDataURL(input.files[0]);
}

function openPreview(idx) {
    const stopUrl = window.location.pathname + "?stop=" + idx;
    window.open(stopUrl, "clue_preview");
}

function renderEditor(idx) {
    const clue = state.clues[idx];
    const area = document.getElementById('editorArea');
    const stopUrl = window.location.origin + window.location.pathname + "?stop=" + idx;

    area.innerHTML = `
        <div class="editor-header">
            <h1>Editing Stop ${idx + 1}</h1>
            <div>
                <button class="btn btn-outline" onclick="openPreview(${idx})">👁️ Preview</button>
                <button class="btn btn-danger" onclick="deleteClue(${idx})">🗑 Delete</button>
            </div>
        </div>

        <div class="grid">
            <div class="editor-card">
                <h3>QR CODE</h3>
                <div id="qrcode" class="qr-box"></div>
                <p style="font-size:10px; color:var(--muted); word-break:break-all; margin-top:10px;">${stopUrl}</p>
            </div>

            <div class="editor-card">
                <h3>CONTENT</h3>
                <label>Title</label>
                <input type="text" value="${clue.title}" oninput="state.clues[${idx}].title=this.value; renderSidebar()">
                <label>Clue Text</label>
                <textarea rows="5" oninput="state.clues[${idx}].clue=this.value">${clue.clue}</textarea>
            </div>
        </div>

        <div class="editor-card">
            <h3>VISUALS</h3>
            <div class="grid">
                <div>
                    <label>Accent Color</label>
                    <input type="color" value="${clue.accentColor}" oninput="state.clues[${idx}].accentColor=this.value">
                </div>
                <div>
                    <label>Background Image</label>
                    <input type="file" accept="image/*" onchange="handleImage(${idx}, this)">
                </div>
            </div>
        </div>
    `;

    new QRCode(document.getElementById("qrcode"), {
        text: stopUrl,
        width: 150, height: 150
    });
}
</script>
